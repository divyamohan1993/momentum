name: Deploy to Cloud Run

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-momentum
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - id: auth
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - uses: google-github-actions/setup-gcloud@v2

      - name: Generate env file (secrets stay in GitHub, become Cloud Run env vars)
        env:
          APP_URL: https://momentum-107722137045.asia-east1.run.app
          SWEEP_SA: momentum-sweeper@dmjone.iam.gserviceaccount.com
          OWNER_PASSPHRASE_HASH: ${{ secrets.OWNER_PASSPHRASE_HASH }}
          SESSION_SECRET: ${{ secrets.SESSION_SECRET }}
          FIELD_KEY: ${{ secrets.FIELD_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          VAPID_PUBLIC_KEY: ${{ secrets.VAPID_PUBLIC_KEY }}
          VAPID_PRIVATE_KEY: ${{ secrets.VAPID_PRIVATE_KEY }}
        run: node scripts/make-env-yaml.mjs > env.deploy.yaml

      - name: Deploy
        run: |
          gcloud run deploy momentum --source . \
            --project=dmjone --region=asia-east1 \
            --service-account=momentum-run@dmjone.iam.gserviceaccount.com \
            --min-instances=0 --max-instances=1 \
            --memory=512Mi --cpu=1 --concurrency=80 --timeout=60 \
            --allow-unauthenticated --quiet \
            --env-vars-file=env.deploy.yaml

      - name: Clean up env file
        if: always()
        run: rm -f env.deploy.yaml
